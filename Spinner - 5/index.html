<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">

    <title>Document</title>
</head>
<body>
    <article>
        <section class = "spinner-block">
            <h4>Dot Spinner</h4>
            <section class = "dot-spinner" aria-label = "dot spinner" tabindex="1">
                <div class="Container">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    

                </div>
            </section>
        </section>
        <section class="spinner-block">
            <h4>Rect Spinner</h4>
            <section class ="rect-spinner" tabindex="1" aria-label="rect spinner">
                <div class="container">
                    <div class="rect"></div>
                     <div class="rect"></div>
                      <div class="rect"></div> 
                      <div class="rect"></div>
                       <div class="rect"></div>
                        <div class="rect"></div>
                         <div class="rect"></div>
                         <div class="rect"></div>
                          <div class="rect"></div>
                           <div class="rect"></div>
                            <div class="rect"></div>
                             <div class="rect"></div>
                              <div class="rect"></div>
                               <div class="rect"></div>
                                <div class="rect"></div>
                                 <div class="rect"></div>

                </div>
            </section>
        </section>
        <section class="spinner-block">
            <h4>Comet Spinner</h4>
            <section class="comet-spinner" tabindex="1" aria-label="comet-spinner">
                <div class="inner-circle"></div>
                <div class="comet"></div>
            </section>
        </section>
    </article>
</body>
</html>
